<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红色足迹：永州之旅</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <div id="start-screen" class="screen active">
            <div class="start-content">
                <h1 class="game-title">红色足迹</h1>
                <h2 class="game-subtitle">永州之旅</h2>
                <p class="game-description">在永州红色文化的世界中<br>通过贪吃蛇和分支叙事的方式<br>学习革命历史，传承红色精神</p>
                <div class="start-buttons">
                    <button id="btn-new-game" class="btn btn-primary">开始游戏</button>
                    <button id="btn-continue" class="btn btn-secondary" style="display:none;">继续游戏</button>
                </div>
                <div class="tips">
                    <h3>游戏说明</h3>
                    <ul>
                        <li>🐍 控制贪吃蛇移动，吃到苹果</li>
                        <li>🍎 吃到苹果触发历史事件或知识问答</li>
                        <li>📚 学习永州红色文化和革命历史</li>
                        <li>🏆 收集经验，提升等级</li>
                    </ul>
                </div>
            </div>
        </div>

        <div id="create-player-screen" class="screen">
            <div class="create-content">
                <h2>创建角色</h2>
                <p class="subtitle">请输入你的名字，开始韶山之旅</p>
                <div class="input-group">
                    <input type="text" id="player-name-input" placeholder="输入你的名字" maxlength="20">
                </div>
                <div class="btn-group">
                    <button id="btn-confirm-create" class="btn btn-primary">确认创建</button>
                    <button id="btn-back-to-start" class="btn btn-secondary">返回</button>
                </div>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <header id="header">
                <div class="player-info">
                    <div class="player-name" id="display-player-name">玩家</div>
                    <div class="player-level">等级: <span id="display-level">1</span></div>
                </div>
                <div class="stats-container">
                    <div class="stat-item" title="金币">
                        <span class="stat-icon">🪙</span>
                        <span class="stat-value" id="display-gold">100</span>
                    </div>
                    <div class="stat-item" title="经验">
                        <span class="stat-icon">⭐</span>
                        <span class="stat-value" id="display-experience">0</span>
                    </div>
                    <div class="stat-item" title="体力">
                        <span class="stat-icon">❤️</span>
                        <span class="stat-value" id="display-energy">100</span>
                    </div>
                    <div class="stat-item" title="声望">
                        <span class="stat-icon">🏅</span>
                        <span class="stat-value" id="display-reputation">0</span>
                    </div>
                </div>
            </header>

            <main id="game-main">
                <div id="board-container">
                    <canvas id="game-board" width="800" height="600"></canvas>
                </div>

                <div id="control-panel">
                    <button id="btn-show-map" class="btn btn-small">📍 地点</button>
                    <button id="btn-show-questions" class="btn btn-small">📚 题库</button>
                    <button id="btn-show-story" class="btn btn-small">📖 剧情</button>
                    <button id="btn-pause" class="btn btn-small">⏸️ 暂停</button>
                </div>

                <div id="message-area">
                    <div id="game-message" class="message"></div>
                </div>
            </main>
        </div>

        <div id="event-modal" class="modal">
            <div class="modal-content event-modal-content">
                <div class="modal-header">
                    <h3 id="event-title">事件标题</h3>
                    <button class="modal-close" onclick="closeModal('event-modal')">&times;</button>
                </div>
                <div class="modal-body">
                    <div id="event-location" class="event-location"></div>
                    <div id="event-description" class="event-description"></div>
                    <div id="event-choices" class="event-choices"></div>
                </div>
            </div>
        </div>

        <div id="question-modal" class="modal">
            <div class="modal-content question-modal-content">
                <div class="modal-header">
                    <h3 id="question-title">知识问答</h3>
                    <button class="modal-close" onclick="closeModal('question-modal')">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="question-difficulty" id="question-difficulty"></div>
                    <div class="question-text" id="question-text"></div>
                    <div class="question-options" id="question-options"></div>
                    <div id="question-result" class="question-result" style="display:none;"></div>
                    <div id="question-explanation" class="question-explanation" style="display:none;"></div>
                </div>
                <div class="modal-footer">
                    <button id="btn-submit-answer" class="btn btn-primary">提交答案</button>
                    <button id="btn-next-question" class="btn btn-primary" style="display:none;">下一题</button>
                    <button class="btn btn-secondary" onclick="closeModal('question-modal')" style="display:none;" id="btn-close-question">关闭</button>
                </div>
            </div>
        </div>

        <div id="opportunity-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="opportunity-title">🎰 机遇</h3>
                    <button class="modal-close" onclick="closeModal('opportunity-modal')">&times;</button>
                </div>
                <div class="modal-body">
                    <div id="opportunity-content" class="opportunity-content"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" onclick="closeModal('opportunity-modal')">确定</button>
                </div>
            </div>
        </div>

        <div id="location-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>📍 韶山地点</h3>
                    <button class="modal-close" onclick="closeModal('location-modal')">&times;</button>
                </div>
                <div class="modal-body">
                    <div id="location-list" class="location-list"></div>
                </div>
            </div>
        </div>

        <div id="story-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>📖 剧情进度</h3>
                    <button class="modal-close" onclick="closeModal('story-modal')">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="progress-info">
                        <p>当前等级: <span id="story-level">1</span></p>
                        <p>已完成事件: <span id="story-completed">0</span></p>
                        <p>获得成就: <span id="story-achievements">0</span></p>
                    </div>
                    <div id="achievement-list" class="achievement-list"></div>
                </div>
            </div>
        </div>

        <div id="pause-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>⏸️ 游戏暂停</h3>
                </div>
                <div class="modal-body">
                    <div class="pause-menu">
                        <button id="btn-resume" class="btn btn-primary btn-large">继续游戏</button>
                        <button id="btn-save-quit" class="btn btn-secondary btn-large">保存并退出</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="level-up-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>🎉 升级！</h3>
                </div>
                <div class="modal-body">
                    <div class="level-up-content">
                        <div class="level-up-icon">⬆️</div>
                        <p>恭喜！你升到了 <span id="new-level">2</span> 级！</p>
                        <p>解锁更多精彩剧情！</p>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" onclick="closeModal('level-up-modal')">太棒了！</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/game-api.js"></script>
    <script src="js/game.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
